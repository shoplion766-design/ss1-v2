name: ss1

services:
  postgres:
    image: docker.io/postgres:16-alpine
    environment:
      POSTGRES_DB: ss1_db
      POSTGRES_USER: ss1_user
      POSTGRES_PASSWORD: ss1_secret_2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./init-vouchers.sql:/docker-entrypoint-initdb.d/02_vouchers.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ss1_user -d ss1_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: docker.io/redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build: ./services/auth
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://ss1_user:ss1_secret_2024@postgres:5432/ss1_db
      JWT_SECRET: ss1_jwt_super_secret_2024_xK9mP2
      JWT_REFRESH_SECRET: ss1_refresh_secret_2024_xZ7nQ8
      REDIS_URL: redis://redis:6379
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  affiliate-service:
    build: ./services/affiliate
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: postgresql://ss1_user:ss1_secret_2024@postgres:5432/ss1_db
      JWT_SECRET: ss1_jwt_super_secret_2024_xK9mP2
      REDIS_URL: redis://redis:6379
      PORT: 3002
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  admin-service:
    build: ./services/admin
    ports:
      - "3003:3003"
    environment:
      DATABASE_URL: postgresql://ss1_user:ss1_secret_2024@postgres:5432/ss1_db
      JWT_SECRET: ss1_jwt_super_secret_2024_xK9mP2
      REDIS_URL: redis://redis:6379
      PORT: 3003
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  gateway:
    build: ./gateway
    ports:
      - "4000:4000"
    environment:
      AUTH_SERVICE_URL: http://auth-service:3001
      AFFILIATE_SERVICE_URL: http://affiliate-service:3002
      ADMIN_SERVICE_URL: http://admin-service:3003
      JWT_SECRET: ss1_jwt_super_secret_2024_xK9mP2
      PORT: 4000
    depends_on:
      - auth-service
      - affiliate-service
      - admin-service
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      WATCHPACK_POLLING: "true"
    depends_on:
      - gateway
    stdin_open: true
    tty: true
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped

volumes:
  postgres_data:
