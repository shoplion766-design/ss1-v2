name: ss1

services:
  postgres:
    image: docker.io/postgres:16-alpine
    environment:
      POSTGRES_DB: ss1_db
      POSTGRES_USER: ss1_user
      POSTGRES_PASSWORD: ss1_secret_2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./init-vouchers.sql:/docker-entrypoint-initdb.d/02_vouchers.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ss1_user -d ss1_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: docker.io/redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend unifié (remplace les microservices en local) ──
  backend:
    build: ./ss1-v2
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://ss1_user:ss1_secret_2024@postgres:5432/ss1_db
      JWT_SECRET: ss1_jwt_super_secret_2024_xK9mP2
      JWT_REFRESH_SECRET: ss1_refresh_secret_2024_xZ7nQ8
      PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      # NEXT_PUBLIC_* sont baked au build — pointer vers le service Docker
      args:
        NEXT_PUBLIC_API_URL: http://backend:8080
        NEXT_PUBLIC_SITE_NAME: SS1
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
